name: Feature request
description: Propose an improvement to AsaDB
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Show example SQL or an interaction when possible.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and storage impact
      description: Describe effects on existing SQL, database files, memory, recovery, or packaging.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement or test this proposal.
